<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tags html</title>
</head>
<body>
    <h1 title="tags html">Tags em HTML</h1>
    <p>Em HTML5, podemos inserir os elementos da lista a seguir. Passe o mouse sobre os termos para descobrir qual tag deverá utilizar em cada caso</p>
    <ul>
        <li title="use a tag &lt;p&gt;">Páragrafo</li>
        <li title="use as tag &lt;h1&gt;, &lt;h2&gt;, &lt;h3&gt;, etc">Títulos</li>
        <li title="use a tag &lt;img&gt;">Imagens</li>
        <li title="use a tag &lt;abbr&gt;">Abreviações</li>
        <li title="use a tag &lt;code&gt;">Códigos-fonte</li>
        <li title="use a tag &lt;ol&gt;, com cada iten numero dentro da tag &lt;li&gt;">Listas numeradas</li>
        <li title="use a tag &lt;ul&gt;, com cada item na tag &lt;li&gt;">Listas com demarcadores</li>
    </ul>
</body>
</html>
