<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personalizando Links</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
        }
        a{
            color: red;
            text-decoration: none;
            font-weight: bold;
        }
        a:visited{
            color:darkred ;
        }
        a:hover{
            text-decoration:underline ;
            color: black;
        }
        a:active{
            color: yellow;
        }
        a::after{
            content: ' [link]';
            text-decoration: none;
        }
    </style>
</head>
<body>
    <ul>
        <li><a href="https://www.instagram.com/" target="_blank">Repositório GitHub</a></li>
        <li><a href="https://www.instagram.com/" target="_blank">Canal Youtube</a></li>
        <li><a href="https://www.instagram.com/" target="_blank">Site CursoemVideo</a></li>
    </ul>
</body>
</html>
