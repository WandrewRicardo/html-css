<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Videos</title>
</head>
<body>
    <h1>Inserindo Videos hospedados localmente</h1>
    <p>Este video está hospedado no meu próprio servidor</p>
    <video width="500" height="500" controls autoplay loop muted >
        <source src="midia/Midia-Test.M4v.mp4" type="video/mp4">
        <source src="midia/Midia-Test.webm.webm" type="video/webm">
        <source src="midia/midia-test.mp4.mp4" type="video/mp4">
        <p>Seu navegador não tem compatibilidade com reprodutor de video</p>
    </video>
    <h1>Inserindo vídeos do YouTube </h1>
    <iframe width="560" height="315" src="https://www.youtube.com/embed/-0O1z5KSYCg?si=XNWa96mh7RhFJBKs" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>

</body>
</html>
